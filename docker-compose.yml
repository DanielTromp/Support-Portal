# Support Portal
#
# Build & start:  podman-compose up -d --build
# Logs:           podman-compose logs -f
# Stop:           podman-compose down

name: support-portal

services:
  support-portal:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost/support-portal:latest
    container_name: support-portal
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data:Z
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env (64-char hex)}
      - AUTH_TRUST_HOST=true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/faq > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
